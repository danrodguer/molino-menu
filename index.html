<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital | Molino</title>
    <meta name="description" content="Menú digital interactivo de Molino - Tu punto de encuentro.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="menu-container" id="menu-top">
        <!-- Page 1: Logo & Cover -->
        <section class="menu-page">
            <img src="image/1.jpg" alt="Menú Molino Página 1 - Portada" loading="eager">
        </section>

        <!-- Page 2: Desayunos & Todo el día -->
        <section class="menu-page">
            <img src="image/2.jpg" alt="Menú Molino Página 2 - Desayunos" loading="lazy">
        </section>

        <!-- Page 3: Para picar, ensaladas, bowls -->
        <section class="menu-page">
            <img src="image/3.jpg" alt="Menú Molino Página 3 - Entradas y Ensaladas" loading="lazy">
        </section>

        <!-- Page 4: Hamburguesas, Sándwiches, Pepitos -->
        <section class="menu-page">
            <img src="image/4.jpg" alt="Menú Molino Página 4 - Platos Principales" loading="lazy">
        </section>

        <!-- Page 5: Mezcla, Quesadillas, Wraps, Platos Fuertes -->
        <section class="menu-page">
            <img src="image/5.jpg" alt="Menú Molino Página 5 - Especialidades" loading="lazy">
        </section>

        <!-- Page 6: Cafetería (Calientes) -->
        <section class="menu-page">
            <img src="image/6.jpg" alt="Menú Molino Página 6 - Cafetería Caliente" loading="lazy">
        </section>

        <!-- Page 7: Bebidas Frías, Refrescantes -->
        <section class="menu-page">
            <img src="image/7.jpg" alt="Menú Molino Página 7 - Bebidas Frías" loading="lazy">
        </section>

        <!-- Page 8: Smoothies, Shakes -->
        <section class="menu-page">
            <img src="image/8.jpg" alt="Menú Molino Página 8 - Smoothies" loading="lazy">
        </section>
    </main>

    <!-- Floating Action Button -->
    <a href="#menu-top" class="back-to-top" title="Volver arriba">
        <i class="fas fa-chevron-up"></i>
    </a>

    <script src="app.js"></script>
</body>

</html>
